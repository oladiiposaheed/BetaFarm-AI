<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BetaFarm AI - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="background: #f0f2f5;">
    <div class="app-container" style="justify-content: center;">
        <div style="padding: 20px;">
            <div class="text-center mb-4">
                <div class="logo-circle mx-auto"><i class="fas fa-leaf"></i></div>
                <h1 style="font-size: 28px; color: #075e54;">BetaFarm AI</h1>
                <p style="color: #667781;">Your Agricultural Assistant</p>
            </div>

            <div class="modern-card">
                <h3 class="text-center mb-3" style="font-size: 18px;">Welcome Back</h3>
                <label class="form-label"><i class="fas fa-phone-alt me-2" style="color: #075e54;"></i>Phone Number</label>
                <div style="display: flex; gap: 8px; margin-bottom: 8px;">
                    <span style="background: #f0f2f5; padding: 10px 16px; border-radius: 30px;">+234</span>
                    <input type="tel" id="phoneNumber" class="form-control" placeholder="8012345678" maxlength="10" style="flex:1;">
                </div>
                <button id="sendOtpBtn" class="btn-primary" style="background: #075e54;"><i class="fas fa-paper-plane me-2"></i> Send OTP</button>
                <hr class="my-3">
                <button id="registerBtn" class="btn-outline"><i class="fas fa-user-plus me-2"></i> New Account</button>
            </div>
            <p class="text-center text-muted mt-4" style="font-size: 12px;"><i class="fas fa-shield-alt me-1"></i> Secure & Free</p>
        </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3">
        <div id="liveToast" class="toast"><div class="toast-header"><i class="fas fa-info-circle me-2"></i><strong>BetaFarm AI</strong><button type="button" class="btn-close" data-bs-dismiss="toast"></button></div><div class="toast-body" id="toastMessage"></div></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:8000/api';
        function showToast(msg, type) {
            const tb = document.getElementById('toastMessage');
            if (!tb) return;
            tb.innerHTML = (type === 'success' ? '✅ ' : '❌ ') + msg;
            new bootstrap.Toast(document.getElementById('liveToast')).show();
        }
        document.getElementById('sendOtpBtn').onclick = async () => {
            let phone = document.getElementById('phoneNumber').value.trim();
            if (!phone || phone.length !== 10) { showToast('Enter 10-digit number', 'error'); return; }
            const fullPhone = '234' + phone;
            try {
                const res = await fetch(`${API_URL}/auth/send-otp/`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone_number: fullPhone })
                });
                if (res.ok) {
                    localStorage.setItem('userPhone', fullPhone);
                    showToast('OTP sent!', 'success');
                    window.location.href = `otp.html?phone=${fullPhone}`;
                } else showToast('Failed', 'error');
            } catch(e) { showToast('Server error', 'error'); }
        };
        document.getElementById('registerBtn').onclick = () => showToast('Enter phone and click Send OTP', 'info');
    </script>
</body>
</html>
