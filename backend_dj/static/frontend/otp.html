<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BetaFarm AI - Verify OTP</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <a href="index.html"><i class="fas fa-arrow-left"></i></a>
            <h1>Verify Code</h1>
            <div style="width: 24px;"></div>
        </div>
        <div class="messages-container" style="justify-content: center;">
            <div class="text-center mb-3">
                <p style="color: #667781;">Enter 6-digit code sent to <strong id="displayPhone" style="color: #075e54;"></strong></p>
            </div>
            <div class="modern-card">
                <div class="otp-grid">
                    <input type="text" class="otp-box" maxlength="1" id="otp0">
                    <input type="text" class="otp-box" maxlength="1" id="otp1">
                    <input type="text" class="otp-box" maxlength="1" id="otp2">
                    <input type="text" class="otp-box" maxlength="1" id="otp3">
                    <input type="text" class="otp-box" maxlength="1" id="otp4">
                    <input type="text" class="otp-box" maxlength="1" id="otp5">
                </div>
                <button id="verifyOtpBtn" class="btn-primary" style="background: #075e54;"><i class="fas fa-check-circle me-2"></i> Verify & Login</button>
                <div class="text-center mt-3"><span style="color: #667781;">Didn't receive?</span> <button id="resendOtpBtn" class="btn btn-link" style="color: #075e54;">Resend OTP</button></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const API_URL = 'http://localhost:8000/api';
        function getOtp() { let o = ''; for(let i=0;i<=5;i++) o += document.getElementById(`otp${i}`).value; return o; }
        for(let i=0;i<=4;i++) document.getElementById(`otp${i}`).addEventListener('keyup', function(){ if(this.value.length===1) document.getElementById(`otp${i+1}`).focus(); });
        let phone = new URLSearchParams(location.search).get('phone') || localStorage.getItem('userPhone');
        if(phone) document.getElementById('displayPhone').innerText = phone; else location.href='index.html';
        document.getElementById('verifyOtpBtn').onclick = async () => {
            const otp = getOtp();
            if(otp.length!==6){ alert('Enter 6-digit code'); return; }
            try {
                const res = await fetch(`${API_URL}/auth/verify-otp/`,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ phone_number:phone, otp_code:otp })});
                const data = await res.json();
                if(res.ok){ localStorage.setItem('access_token',data.access); localStorage.setItem('refresh_token',data.refresh); localStorage.setItem('userName',data.user?.full_name||'Farmer'); window.location.href='dashboard.html'; }
                else alert(data.error||'Invalid OTP');
            } catch(e){ alert('Network error'); }
        };
        document.getElementById('resendOtpBtn').onclick = async () => { try{ await fetch(`${API_URL}/auth/send-otp/`,{ method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ phone_number:phone })}); alert('OTP resent!'); } catch(e){ alert('Failed'); } };
    </script>
</body>
</html>
