<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetaFarm AI - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5}
        .app-container{max-width:450px;margin:0 auto;background:#f0f2f5;min-height:100vh;padding-bottom:70px}
        .app-header{background:linear-gradient(135deg,#075e54,#128c7e);padding:20px 16px;color:white}
        .welcome-text{font-size:14px;opacity:0.9;margin-bottom:4px}
        .user-name{font-size:24px;font-weight:600}
        .stats-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;padding:16px}
        .stat-card{background:white;border-radius:20px;padding:16px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,0.05)}
        .stat-icon{font-size:32px;margin-bottom:8px}
        .stat-number{font-size:28px;font-weight:700;color:#075e54}
        .stat-label{font-size:12px;color:#667781;margin-top:4px}
        .section-title{font-size:16px;font-weight:600;color:#075e54;margin:16px 16px 12px 16px}
        .actions-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;padding:0 16px}
        .action-card{background:white;border-radius:16px;padding:12px;text-align:center;text-decoration:none;display:block}
        .action-card:active{transform:scale(0.96)}
        .action-icon{font-size:28px;display:block;margin-bottom:8px}
        .action-label{font-size:11px;color:#4a5b4a;font-weight:500}
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:450px;margin:0 auto;background:white;display:flex;justify-content:space-around;padding:8px 12px;border-top:0.5px solid #e2e8e2}
        .nav-item{text-align:center;padding:4px 0;color:#667781;text-decoration:none;font-size:10px;flex:1}
        .nav-item i{font-size:20px;display:block;margin-bottom:2px}
        .nav-item.active{color:#25d366}
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div class="welcome-text">Welcome back,</div>
            <div class="user-name" id="userName">Farmer</div>
        </div>
        <div class="stats-grid">
            <div class="stat-card"><div class="stat-icon">🌾</div><div class="stat-number">0</div><div class="stat-label">Active Farms</div></div>
            <div class="stat-card"><div class="stat-icon">🔍</div><div class="stat-number">0</div><div class="stat-label">Predictions</div></div>
            <div class="stat-card"><div class="stat-icon">💬</div><div class="stat-number">0</div><div class="stat-label">Chats</div></div>
            <div class="stat-card"><div class="stat-icon">✅</div><div class="stat-number">0</div><div class="stat-label">Success Rate</div></div>
        </div>
        <div class="section-title">Quick Actions</div>
        <div class="actions-grid">
            <a href="/chat/" class="action-card"><span class="action-icon">💬</span><span class="action-label">AI Assistant</span></a>
            <a href="/disease/" class="action-card"><span class="action-icon">🔬</span><span class="action-label">Detect</span></a>
            <a href="/history/" class="action-card"><span class="action-icon">📋</span><span class="action-label">History</span></a>
            <a href="/profile/" class="action-card"><span class="action-icon">👤</span><span class="action-label">Profile</span></a>
        </div>
        <div class="bottom-nav">
            <a href="/dashboard/" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="/chat/" class="nav-item"><i class="fas fa-comment-dots"></i><span>Chat</span></a>
            <a href="/disease/" class="nav-item"><i class="fas fa-camera"></i><span>Detect</span></a>
            <a href="/history/" class="nav-item"><i class="fas fa-history"></i><span>History</span></a>
            <a href="/profile/" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
        </div>
    </div>
    <script>
        if (!localStorage.getItem('access_token')) window.location.href='/';
        document.getElementById('userName').innerText=localStorage.getItem('userName')||'Farmer';
    </script>
</body>
</html>
