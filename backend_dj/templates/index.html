<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetaFarm AI - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#f0f2f5;min-height:100vh;display:flex;align-items:center;justify-content:center}
        .login-container{max-width:400px;width:100%;margin:20px;background:white;border-radius:32px;box-shadow:0 4px 20px rgba(0,0,0,0.08);overflow:hidden}
        .login-header{background:linear-gradient(135deg,#075e54,#128c7e);padding:40px 20px;text-align:center;color:white}
        .logo-circle{width:80px;height:80px;background:rgba(255,255,255,0.2);border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
        .logo-circle i{font-size:40px;color:white}
        .login-header h1{font-size:28px;margin-bottom:8px}
        .login-header p{font-size:14px;opacity:0.9}
        .login-body{padding:32px 24px}
        .form-group{margin-bottom:20px}
        .form-label{display:block;margin-bottom:8px;color:#075e54;font-weight:500;font-size:14px}
        .phone-input{display:flex;gap:8px;align-items:center}
        .country-code{background:#f0f2f5;padding:12px 16px;border-radius:30px;font-weight:500;color:#075e54}
        .phone-input input{flex:1;padding:12px 16px;border:1px solid #e0e0e0;border-radius:30px;font-size:16px;outline:none}
        .phone-input input:focus{border-color:#075e54}
        .btn-send{width:100%;padding:14px;background:#075e54;color:white;border:none;border-radius:30px;font-size:16px;font-weight:600;cursor:pointer;margin-top:10px}
        .btn-send:disabled{background:#99b8b4;cursor:not-allowed}
        .divider{text-align:center;margin:24px 0;position:relative}
        .divider::before{content:'';position:absolute;top:50%;left:0;right:0;height:1px;background:#e0e0e0}
        .divider span{background:white;padding:0 12px;position:relative;color:#999;font-size:12px}
        .btn-register{width:100%;padding:14px;background:white;color:#075e54;border:1px solid #075e54;border-radius:30px;font-size:16px;font-weight:600;cursor:pointer}
        .footer{text-align:center;padding:20px;font-size:12px;color:#999}
        .toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:30px;font-size:14px;z-index:1000;color:white;text-align:center}
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="logo-circle"><i class="fas fa-leaf"></i></div>
            <h1>BetaFarm AI</h1>
            <p>Your Agricultural Assistant</p>
        </div>
        <div class="login-body">
            <div class="form-group">
                <label class="form-label"><i class="fas fa-phone-alt" style="color:#075e54;margin-right:8px"></i> Phone Number</label>
                <div class="phone-input">
                    <span class="country-code">+234</span>
                    <input type="tel" id="phoneNumber" placeholder="8012345678" maxlength="10">
                </div>
            </div>
            <button id="sendOtpBtn" class="btn-send">Send OTP</button>
            <div class="divider"><span>OR</span></div>
            <button id="registerBtn" class="btn-register"><i class="fas fa-user-plus" style="margin-right:8px"></i> New Account</button>
        </div>
        <div class="footer"><i class="fas fa-shield-alt"></i> Secure & Free</div>
    </div>
    <script>
        const API_BASE='/api';
        function showToast(msg,isError){const old=document.querySelector('.toast');if(old)old.remove();const div=document.createElement('div');div.className='toast';div.style.backgroundColor=isError?'#dc3545':'#075e54';div.innerHTML=(isError?'❌ ':'✅ ')+msg;document.body.appendChild(div);setTimeout(()=>div.remove(),3000);}
        document.getElementById('sendOtpBtn').onclick=async function(){const phone=document.getElementById('phoneNumber').value.trim();if(!phone){showToast('Enter phone number',true);return;}if(phone.length!==10){showToast('Enter 10-digit number',true);return;}const fullPhone='234'+phone;const btn=this;const originalText=btn.innerText;btn.disabled=true;btn.innerText='Sending...';try{const res=await fetch(API_BASE+'/auth/send-otp/',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone_number:fullPhone})});const data=await res.json();if(res.ok){localStorage.setItem('userPhone',fullPhone);showToast('OTP sent!',false);setTimeout(()=>window.location.href='/otp?phone='+encodeURIComponent(fullPhone),1500);}else{showToast(data.error||'Failed',true);}}catch(e){showToast('Network error',true);}finally{btn.disabled=false;btn.innerText=originalText;}};
        document.getElementById('registerBtn').onclick=()=>showToast('Enter phone number and click Send OTP',false);
        document.getElementById('phoneNumber').addEventListener('keypress',e=>{if(e.key==='Enter')document.getElementById('sendOtpBtn').click();});
    </script>
</body>
</html>
