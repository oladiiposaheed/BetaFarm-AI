<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BetaFarm AI - Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <a href="dashboard.html"><i class="fas fa-arrow-left"></i></a>
            <h1>My Profile</h1>
            <div style="width: 24px;"></div>
        </div>
        <div class="messages-container" style="justify-content: center;">
            <div class="text-center mb-3">
                <div class="logo-circle mx-auto" style="background: #e8f5e9;"><i class="fas fa-user fa-2x" style="color: #075e54;"></i></div>
            </div>
            <div class="modern-card"><div style="color: #667781;"><i class="fas fa-user me-1"></i> Full Name</div><strong id="displayName">Farmer</strong></div>
            <div class="modern-card"><div style="color: #667781;"><i class="fas fa-phone me-1"></i> Phone Number</div><strong id="displayPhone">-</strong></div>
            <div class="modern-card"><div style="color: #667781;"><i class="fas fa-calendar me-1"></i> Member Since</div><strong>2025</strong></div>
            <button id="logoutBtn" class="btn-danger" style="background: #dc3545;"><i class="fas fa-sign-out-alt me-2"></i> Logout</button>
        </div>
        <div class="bottom-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="chat.html" class="nav-item"><i class="fas fa-comment-dots"></i><span>Chat</span></a>
            <a href="disease.html" class="nav-item"><i class="fas fa-camera"></i><span>Detect</span></a>
            <a href="history.html" class="nav-item"><i class="fas fa-history"></i><span>History</span></a>
            <a href="profile.html" class="nav-item active"><i class="fas fa-user"></i><span>Profile</span></a>
        </div>
    </div>
    <script>
        if (!localStorage.getItem('access_token')) window.location.href = 'index.html';
        document.getElementById('displayName').innerText = localStorage.getItem('userName') || 'Farmer';
        document.getElementById('displayPhone').innerText = localStorage.getItem('userPhone') || '-';
        document.getElementById('logoutBtn').onclick = () => { localStorage.clear(); window.location.href = 'index.html'; };
    </script>
</body>
</html>
