<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BetaFarm AI - {% block title %}Page Name{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- No external style.css link -->
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Arial,sans-serif;background:#f0f2f5}
        .main-container{max-width:450px;margin:0 auto;background:#f0f2f5;min-height:100vh;padding-bottom:70px}
        .sticky-header{background:linear-gradient(135deg,#075e54,#128c7e);padding:16px;display:flex;align-items:center;gap:12px;color:white;position:sticky;top:0;z-index:100}
        .sticky-header a{color:white;font-size:20px;text-decoration:none}
        .sticky-header h1{font-size:18px;margin:0;flex:1}
        .content{padding:16px}
        .bottom-nav{position:fixed;bottom:0;left:0;right:0;max-width:450px;margin:0 auto;background:white;display:flex;justify-content:space-around;padding:8px 12px;border-top:0.5px solid #e2e8e2}
        .nav-item{text-align:center;padding:4px 0;color:#667781;text-decoration:none;font-size:10px;flex:1}
        .nav-item i{font-size:20px;display:block;margin-bottom:2px}
        .nav-item.active{color:#25d366}
    </style>
</head>
<body>
    <div class="main-container">
        <div class="sticky-header">
            <a href="/dashboard/"><i class="fas fa-arrow-left"></i></a>
            <h1><i class="fas fa-leaf"></i> BetaFarm AI</h1>
            <div style="width: 24px;"></div>
        </div>
        <div class="content">
            {% block content %}{% endblock %}
        </div>
        <div class="bottom-nav">
            <a href="/dashboard/" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="/chat/" class="nav-item"><i class="fas fa-comment-dots"></i><span>Chat</span></a>
            <a href="/disease/" class="nav-item"><i class="fas fa-camera"></i><span>Detect</span></a>
            <a href="/history/" class="nav-item"><i class="fas fa-history"></i><span>History</span></a>
            <a href="/profile/" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        if (!localStorage.getItem('access_token') && !window.location.pathname.includes('/') && !window.location.pathname.includes('otp')) {
            window.location.href = '/';
        }
    </script>
</body>
</html>
