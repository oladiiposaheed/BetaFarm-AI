<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BetaFarm AI - Chat</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; font-size: 14px; }
        
        .app-container { max-width: 450px; margin: 0 auto; background: #efeae2; min-height: 100vh; display: flex; flex-direction: column; }
        
        .app-header { background: #075e54; padding: 12px 16px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
        .app-header a { color: white; font-size: 20px; text-decoration: none; }
        .app-header h1 { font-size: 18px; color: white; margin: 0; flex: 1; font-weight: 500; }
        .app-header .status { font-size: 11px; opacity: 0.8; }
        .clear-chat { background: none; border: none; color: white; font-size: 16px; cursor: pointer; }
        
        .messages-container { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 8px; }
        
        .message-farmer { display: flex; justify-content: flex-end; margin-bottom: 4px; }
        .message-farmer .bubble { background: #dcf8c5; color: #111; border-radius: 18px 18px 4px 18px; padding: 10px 14px; max-width: 80%; word-wrap: break-word; }
        
        .message-ai { display: flex; gap: 8px; margin-bottom: 4px; }
        .message-ai .avatar { width: 36px; height: 36px; background: #25d366; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .message-ai .avatar i { color: white; font-size: 18px; }
        .message-ai .bubble { background: white; color: #111; border-radius: 18px 18px 18px 4px; padding: 10px 14px; max-width: 80%; word-wrap: break-word; box-shadow: 0 1px 0.5px rgba(0,0,0,0.05); }
        
        .message-info { display: flex; align-items: center; justify-content: flex-end; gap: 4px; margin-top: 4px; font-size: 10px; color: #667781; }
        
        .source-badge { background: #f0f2f5; border-radius: 8px; padding: 8px 10px; margin-top: 8px; font-size: 10px; color: #54656f; }
        .source-badge i { color: #25d366; margin-right: 4px; }
        .source-badge strong { color: #111; }
        
        .typing-indicator { display: flex; align-items: center; gap: 8px; padding: 10px 14px; background: white; border-radius: 18px; width: fit-content; }
        .typing-dots { display: flex; gap: 4px; }
        .typing-dots span { width: 8px; height: 8px; background: #9a9a9a; border-radius: 50%; animation: typing 1.4s infinite; }
        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 60%, 100% { transform: translateY(0); opacity: 0.4; } 30% { transform: translateY(-6px); opacity: 1; } }
        
        .input-area { background: #f0f2f5; padding: 8px 12px; display: flex; gap: 8px; align-items: center; }
        .input-area input { flex: 1; border: none; background: white; border-radius: 24px; padding: 10px 16px; font-size: 14px; outline: none; }
        .input-area button { width: 42px; height: 42px; background: #25d366; border: none; border-radius: 50%; color: white; font-size: 18px; cursor: pointer; }
        .input-area button:active { transform: scale(0.95); }
        .input-area button:disabled { background: #99e6b3; cursor: not-allowed; }
        
        .bottom-nav { background: #f0f2f5; display: flex; justify-content: space-around; padding: 8px 12px; border-top: 0.5px solid #e2e8e2; }
        .nav-item { text-align: center; padding: 4px 0; color: #667781; text-decoration: none; font-size: 10px; flex: 1; }
        .nav-item i { font-size: 20px; display: block; margin-bottom: 2px; }
        .nav-item.active { color: #25d366; }
        
        .suggestions { padding: 8px 12px; background: #f0f2f5; border-top: 0.5px solid #e2e8e2; }
        .suggestion-chip { display: inline-block; background: white; border: 0.5px solid #d1d7db; border-radius: 18px; padding: 6px 14px; font-size: 12px; margin: 4px; cursor: pointer; }
        .suggestion-chip:hover { background: #e8f5e9; border-color: #25d366; }
        
        .rich-content { line-height: 1.45; }
        .messages-container::-webkit-scrollbar { width: 6px; }
        .messages-container::-webkit-scrollbar-track { background: transparent; }
        .messages-container::-webkit-scrollbar-thumb { background: #c1c9ce; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <a href="dashboard.html"><i class="fas fa-arrow-left"></i></a>
            <h1><i class="fas fa-robot me-1"></i> BetaFarm AI</h1>
            <div class="status">online</div>
            <button class="clear-chat" id="clearChatBtn"><i class="fas fa-trash-alt"></i></button>
        </div>

        <div class="messages-container" id="messagesContainer">
            <div class="message-ai">
                <div class="avatar"><i class="fas fa-leaf"></i></div>
                <div class="bubble">
                    Hello! I'm your agricultural assistant.<br><br>
                    Ask me about crop diseases, farming practices, or pest control.
                    <div class="message-info"><span>Just now</span><i class="fas fa-check"></i></div>
                </div>
            </div>
        </div>

        <div id="typingIndicator" style="display: none; padding: 8px 16px;">
            <div class="typing-indicator">
                <div class="typing-dots"><span></span><span></span><span></span></div>
                <span style="font-size: 12px; color: #667781;">BetaFarm AI is typing</span>
            </div>
        </div>

        <div class="suggestions">
            <span class="suggestion-chip" data-q="How to treat cassava mosaic?">🌿 Cassava Mosaic</span>
            <span class="suggestion-chip" data-q="What is TME 419 cassava variety?">🌱 TME 419</span>
            <span class="suggestion-chip" data-q="Which country produces cassava most?">🌍 Top Producer</span>
            <span class="suggestion-chip" data-q="How to control whiteflies?">🦟 Whitefly Control</span>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Type a message" autocomplete="off">
            <button id="sendBtn"><i class="fas fa-paper-plane"></i></button>
        </div>

        <div class="bottom-nav">
            <a href="dashboard.html" class="nav-item"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="chat.html" class="nav-item active"><i class="fas fa-comment-dots"></i><span>Chat</span></a>
            <a href="disease.html" class="nav-item"><i class="fas fa-camera"></i><span>Detect</span></a>
            <a href="history.html" class="nav-item"><i class="fas fa-history"></i><span>History</span></a>
            <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000/api';
        const token = localStorage.getItem('access_token');
        const sessionId = localStorage.getItem('userPhone') || 'anonymous';

        if (!token) window.location.href = 'index.html';

        const messagesContainer = document.getElementById('messagesContainer');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        function getTime() {
            return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function scrollBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function saveToStorage(text, sender, sources) {
            const key = `chat_${sessionId}`;
            let history = localStorage.getItem(key);
            history = history ? JSON.parse(history) : [];
            history.push({ text, sender, sources, time: new Date().toISOString() });
            if (history.length > 100) history = history.slice(-100);
            localStorage.setItem(key, JSON.stringify(history));
        }

        function loadFromStorage() {
            const key = `chat_${sessionId}`;
            let history = localStorage.getItem(key);
            if (history) {
                history = JSON.parse(history);
                messagesContainer.innerHTML = '';
                history.forEach(msg => {
                    const time = new Date(msg.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
                    if (msg.sender === 'farmer') {
                        const div = document.createElement('div');
                        div.className = 'message-farmer';
                        div.innerHTML = `<div class="bubble">${escapeHtml(msg.text)}<div class="message-info"><span>${time}</span><i class="fas fa-check-double"></i></div></div>`;
                        messagesContainer.appendChild(div);
                    } else {
                        let srcHtml = '';
                        if (msg.sources && msg.sources.length) {
                            srcHtml = '<div class="source-badge"><i class="fas fa-book"></i> <strong>Sources:</strong><br>';
                            msg.sources.slice(0, 2).forEach(s => {
                                const percent = Math.round((s.relevance || 0.5) * 100);
                                srcHtml += `<small>📄 ${s.filename} (${percent}%)</small><br>`;
                            });
                            srcHtml += '</div>';
                        }
                        const div = document.createElement('div');
                        div.className = 'message-ai';
                        div.innerHTML = `
                            <div class="avatar"><i class="fas fa-leaf"></i></div>
                            <div class="bubble">
                                ${escapeHtml(msg.text).replace(/\n/g, '<br>')}
                                ${srcHtml}
                                <div class="message-info"><span>${time}</span><i class="fas fa-check"></i></div>
                            </div>
                        `;
                        messagesContainer.appendChild(div);
                    }
                });
                scrollBottom();
            }
        }

        function addMessage(text, sender, sources) {
            const time = getTime();
            if (sender === 'farmer') {
                const div = document.createElement('div');
                div.className = 'message-farmer';
                div.innerHTML = `<div class="bubble">${escapeHtml(text)}<div class="message-info"><span>${time}</span><i class="fas fa-check-double"></i></div></div>`;
                messagesContainer.appendChild(div);
            } else {
                let srcHtml = '';
                if (sources && sources.length) {
                    srcHtml = '<div class="source-badge"><i class="fas fa-book"></i> <strong>Sources:</strong><br>';
                    sources.slice(0, 2).forEach(s => {
                        const percent = Math.round((s.relevance || 0.5) * 100);
                        srcHtml += `<small>📄 ${s.filename} (${percent}%)</small><br>`;
                    });
                    srcHtml += '</div>';
                }
                const div = document.createElement('div');
                div.className = 'message-ai';
                div.innerHTML = `
                    <div class="avatar"><i class="fas fa-leaf"></i></div>
                    <div class="bubble">
                        ${escapeHtml(text).replace(/\n/g, '<br>')}
                        ${srcHtml}
                        <div class="message-info"><span>${time}</span><i class="fas fa-check"></i></div>
                    </div>
                `;
                messagesContainer.appendChild(div);
            }
            scrollBottom();
            saveToStorage(text, sender, sources);
        }

        async function sendMessage() {
            const question = messageInput.value.trim();
            if (!question) return;

            addMessage(question, 'farmer');
            messageInput.value = '';
            sendBtn.disabled = true;
            typingIndicator.style.display = 'block';
            scrollBottom();

            try {
                const res = await fetch(`${API_BASE}/chat/ask/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
                    body: JSON.stringify({ question, top_k: 5, session_id: sessionId })
                });
                const data = await res.json();
                if (res.ok && data.answer) {
                    addMessage(data.answer, 'ai', data.sources);
                } else {
                    addMessage('Sorry, I encountered an error. Please try again.', 'ai');
                }
            } catch (error) {
                console.error('Error:', error);
                addMessage('Network error. Please check your connection.', 'ai');
            } finally {
                typingIndicator.style.display = 'none';
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function clearChat() {
            if (confirm('Clear all chat messages?')) {
                localStorage.removeItem(`chat_${sessionId}`);
                messagesContainer.innerHTML = '';
                const welcomeDiv = document.createElement('div');
                welcomeDiv.className = 'message-ai';
                welcomeDiv.innerHTML = `
                    <div class="avatar"><i class="fas fa-leaf"></i></div>
                    <div class="bubble">
                        Hello! I'm your agricultural assistant.<br><br>
                        Ask me about crop diseases, farming practices, or pest control.
                        <div class="message-info"><span>Just now</span><i class="fas fa-check"></i></div>
                    </div>
                `;
                messagesContainer.appendChild(welcomeDiv);
                scrollBottom();
            }
        }

        sendBtn.addEventListener('click', sendMessage);
        messageInput.addEventListener('keypress', (e) => { if (e.key === 'Enter') sendMessage(); });
        document.getElementById('clearChatBtn').addEventListener('click', clearChat);
        
        document.querySelectorAll('.suggestion-chip').forEach(chip => {
            chip.addEventListener('click', () => {
                messageInput.value = chip.dataset.q;
                sendMessage();
            });
        });

        loadFromStorage();
        messageInput.focus();
    </script>
</body>
</html>
