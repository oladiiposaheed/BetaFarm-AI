<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BetaFarm AI - Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <div style="width: 28px;"></div>
            <h1><i class="fas fa-leaf me-1"></i> BetaFarm AI</h1>
            <div style="width: 28px;"></div>
        </div>

        <div class="messages-container" style="justify-content: flex-start;">
            <div class="welcome-card">
                <div style="font-size: 14px; opacity: 0.9;">Hello, 👋</div>
                <div class="welcome-name" id="welcomeName">Farmer</div>
            </div>

            <div class="stats-grid">
                <div class="stat-box"><i class="fas fa-file-pdf fa-2x" style="color: #075e54;"></i><div class="stat-number">22</div><div class="stat-label">PDF Guides</div></div>
                <div class="stat-box"><i class="fas fa-microscope fa-2x" style="color: #075e54;"></i><div class="stat-number" id="predCount">0</div><div class="stat-label">Diagnoses</div></div>
            </div>

            <div style="margin-bottom: 12px;"><strong>Quick Actions</strong></div>
            <div class="actions-grid">
                <a href="chat.html" class="action-card"><i class="fas fa-comment-dots action-icon" style="color: #25d366;"></i><span class="action-label">Ask AI</span></a>
                <a href="disease.html" class="action-card"><i class="fas fa-camera action-icon" style="color: #f44336;"></i><span class="action-label">Detect</span></a>
                <a href="profile.html" class="action-card"><i class="fas fa-user action-icon" style="color: #075e54;"></i><span class="action-label">Profile</span></a>
            </div>
        </div>

        <div class="bottom-nav">
            <a href="dashboard.html" class="nav-item active"><i class="fas fa-home"></i><span>Home</span></a>
            <a href="chat.html" class="nav-item"><i class="fas fa-comment-dots"></i><span>Chat</span></a>
            <a href="disease.html" class="nav-item"><i class="fas fa-camera"></i><span>Detect</span></a>
            <a href="history.html" class="nav-item"><i class="fas fa-history"></i><span>History</span></a>
            <a href="profile.html" class="nav-item"><i class="fas fa-user"></i><span>Profile</span></a>
        </div>
    </div>

    <script>
        if (!localStorage.getItem('access_token')) window.location.href = 'index.html';
        document.getElementById('welcomeName').innerText = localStorage.getItem('userName') || 'Farmer';
    </script>
</body>
</html>
