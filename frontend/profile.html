<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>BetaFarm AI - Profile</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f2f5;
        }
        
        .app-container {
            max-width: 450px;
            margin: 0 auto;
            background: #f0f2f5;
            min-height: 100vh;
            padding-bottom: 70px;
        }
        
        .app-header {
            background: linear-gradient(135deg, #075e54, #128c7e);
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
        }
        
        .app-header a {
            color: white;
            font-size: 20px;
            text-decoration: none;
        }
        
        .app-header h1 {
            font-size: 18px;
            margin: 0;
            flex: 1;
        }
        
        .profile-avatar {
            text-align: center;
            padding: 24px;
        }
        
        .avatar-circle {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #075e54, #128c7e);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        
        .avatar-circle i {
            font-size: 48px;
            color: white;
        }
        
        .profile-card {
            background: white;
            border-radius: 16px;
            margin: 16px;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 16px;
        }
        
        .profile-icon {
            width: 48px;
            height: 48px;
            background: #e8f5e9;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .profile-icon i {
            font-size: 20px;
            color: #075e54;
        }
        
        .profile-info {
            flex: 1;
        }
        
        .profile-label {
            font-size: 12px;
            color: #667781;
            margin-bottom: 4px;
        }
        
        .profile-value {
            font-size: 16px;
            font-weight: 500;
            color: #111;
        }
        
        .logout-btn {
            margin: 16px;
            width: calc(100% - 32px);
            padding: 14px;
            background: #dc3545;
            color: white;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            max-width: 450px;
            margin: 0 auto;
            background: white;
            display: flex;
            justify-content: space-around;
            padding: 8px 12px;
            border-top: 0.5px solid #e2e8e2;
        }
        
        .nav-item {
            text-align: center;
            padding: 4px 0;
            color: #667781;
            text-decoration: none;
            font-size: 10px;
            flex: 1;
        }
        
        .nav-item i {
            font-size: 20px;
            display: block;
            margin-bottom: 2px;
        }
        
        .nav-item.active {
            color: #25d366;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="app-header">
            <a href="/dashboard/"><i class="fas fa-arrow-left"></i></a>
            <h1>My Profile</h1>
            <div style="width: 24px;"></div>
        </div>
        
        <div class="profile-avatar">
            <div class="avatar-circle">
                <i class="fas fa-user"></i>
            </div>
        </div>
        
        <div class="profile-card">
            <div class="profile-icon">
                <i class="fas fa-user"></i>
            </div>
            <div class="profile-info">
                <div class="profile-label">Full Name</div>
                <div class="profile-value" id="displayName">Farmer</div>
            </div>
        </div>
        
        <div class="profile-card">
            <div class="profile-icon">
                <i class="fas fa-phone"></i>
            </div>
            <div class="profile-info">
                <div class="profile-label">Phone Number</div>
                <div class="profile-value" id="displayPhone">-</div>
            </div>
        </div>
        
        <div class="profile-card">
            <div class="profile-icon">
                <i class="fas fa-calendar"></i>
            </div>
            <div class="profile-info">
                <div class="profile-label">Member Since</div>
                <div class="profile-value">2025</div>
            </div>
        </div>
        
        <button id="logoutBtn" class="logout-btn">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
        
        <div class="bottom-nav">
            <a href="/dashboard/" class="nav-item">
                <i class="fas fa-home"></i><span>Home</span>
            </a>
            <a href="/chat/" class="nav-item">
                <i class="fas fa-comment-dots"></i><span>Chat</span>
            </a>
            <a href="/disease/" class="nav-item">
                <i class="fas fa-camera"></i><span>Detect</span>
            </a>
            <a href="/history/" class="nav-item">
                <i class="fas fa-history"></i><span>History</span>
            </a>
            <a href="/profile/" class="nav-item active">
                <i class="fas fa-user"></i><span>Profile</span>
            </a>
        </div>
    </div>
    
    <script>
        // Check authentication
        if (!localStorage.getItem('access_token')) {
            window.location.href = '/';
        }
        
        // Set user info
        document.getElementById('displayName').innerText = localStorage.getItem('userName') || 'Farmer';
        document.getElementById('displayPhone').innerText = localStorage.getItem('userPhone') || '-';
        
        // Logout
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            window.location.href = '/';
        });
    </script>
</body>
</html>
