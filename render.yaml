services:
  # Django Backend Service
  - type: web
    name: backend-django
    runtime: python
    pythonVersion: 3.11
    rootDirectory: backend_dj # ← This tells Render to use backend_dj/ as root
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
      python manage.py migrate --noinput
      python manage.py collectstatic --noinput
    startCommand: gunicorn betafarm.wsgi:application --bind 0.0.0.0:$PORT
    # ... rest of your config

  # RAG Service
  - type: web
    name: betafarm-rag
    runtime: python
    pythonVersion: 3.11
    rootDirectory: rag # ← Uses rag/ as root
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    # ... rest of your config

  # Disease Detection Service
  - type: web
    name: betafarm-fastapi
    runtime: python
    pythonVersion: 3.11
    rootDirectory: inference_api # ← Uses inference_api/ as root
    buildCommand: |
      pip install --upgrade pip
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    # ... rest of your config
