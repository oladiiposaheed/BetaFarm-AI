services:
  # Django Backend Service
  - type: web
    name: backend-django
    runtime: python
    pythonVersion: 3.11
    buildcommand: |
      pip install --upgrade pip --retries 5 --timeout 60
      cd backend_dj
      pip install -r requirements.txt
      python manage.py migrate
      python manage.py collectstatic --noinput
    startcommand: cd backend_dj && gunicorn betafarm_ai.wsgi:application --bind 0.0.0.0:$PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: betafarmdb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com

  # RAG Service (FastAPI)
  - type: web
    name: betafarm-rag
    runtime: python
    pythonVersion: 3.11
    buildcommand: |
      pip install --upgrade pip --retries 5 --timeout 60
      cd rag
      pip install -r requirements.txt
    startcommand: cd rag && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false

  # Disease Detection Service (FastAPI)
  - type: web
    name: betafarm-fastapi
    runtime: python
    pythonVersion: 3.11
    buildcommand: |
      pip install --upgrade pip --retries 5 --timeout 60
      cd inference_api
      pip install -r requirements.txt
    startcommand: cd inference_api && uvicorn main:app --host 0.0.0.0 --port $PORT
